<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Forgot Password</h1>
        <p>Enter your email to generate a reset token, then reset your password below.</p>

        <label for="forgot_email">Email</label>
        <input id="forgot_email" type="email" placeholder="you@example.com">
        <button onclick="requestResetToken()">Generate Reset Token</button>
        <p id="forgot_msg" class="message"></p>

        <hr>

        <h2>Reset Password</h2>
        <label for="reset_token">Reset token</label>
        <input id="reset_token" type="text" placeholder="Paste reset token">
        <label for="new_password">New password</label>
        <input id="new_password" type="password" placeholder="Enter new password">
        <button onclick="resetPassword()">Reset Password</button>
        <p id="reset_msg" class="message"></p>

        <p class="account-link"><a href="/login.html">Back to Login</a></p>
    </div>
</div>

<script>
async function requestResetToken(){
    const email = document.getElementById("forgot_email").value.trim()
    const msg = document.getElementById("forgot_msg")
    if(!email){
        msg.innerText = "Enter your email"
        return
    }
    msg.innerText = "Generating token..."
    try{
        const response = await fetch("/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        })
        const data = await response.json()
        msg.innerText = data.message
        if(data.reset_token){
            document.getElementById("reset_token").value = data.reset_token
            msg.innerText = `${data.message} Token: ${data.reset_token}`
        }
    }
    catch(error){
        msg.innerText = "Backend not running"
        console.log(error)
    }
}

async function resetPassword(){
    const token = document.getElementById("reset_token").value.trim()
    const newPassword = document.getElementById("new_password").value.trim()
    const msg = document.getElementById("reset_msg")
    if(!token || !newPassword){
        msg.innerText = "Fill all fields"
        return
    }
    msg.innerText = "Resetting password..."
    try{
        const response = await fetch("/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: token, new_password: newPassword })
        })
        const data = await response.json()
        msg.innerText = data.message
    }
    catch(error){
        msg.innerText = "Backend not running"
        console.log(error)
    }
}
</script>
</body>
</html>
