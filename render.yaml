services:
  - type: web
    name: ev-charging-app
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/render_start.sh
    healthCheckPath: /login.html
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_ENGINE
        value: sqlite
      - key: SQLITE_PATH
        value: /var/data/ev_app.db
      - key: EMAIL_DEV_OUTBOX
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: ev-data
      mountPath: /var/data
      sizeGB: 1
